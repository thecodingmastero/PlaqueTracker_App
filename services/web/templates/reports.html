<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reports — PlaqueTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">PlaqueTracker</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/scans">Scans</a></li>
            <li class="nav-item"><a class="nav-link" href="/trends">Trends</a></li>
            <li class="nav-item"><a class="nav-link" href="/rewards">Rewards</a></li>
            <li class="nav-item"><a class="nav-link" href="/devices">Devices</a></li>
            <li class="nav-item"><a class="nav-link active" href="/reports">Reports</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <h2>Reports</h2>
      <div class="list-group">
        {% for r in reports %}
          <a class="list-group-item list-group-item-action" href="{{ r.path }}">{{ r.name }} <small class="text-muted">{{ r.generated_at }}</small></a>
        {% endfor %}
      </div>
      <a href="/" class="btn btn-outline-primary mt-3">Back</a>
    </div>
    <script src="{{ url_for('static', filename='mobile-nav.js') }}"></script>
  </body>
</html>
